document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"margin-top: 24px; font-size: 16px; line-height: 1.8; color: #666666; display: flex; flex-direction: column; gap: 18px; max-width: 620px;\">\n          <p>The Builder's Handbook is a podcast exploring the ideas, decisions, and stories behind people building businesses, organizations, communities, technology, and lives of lasting impact.<\u002Fp>\n          <p>Hosted by <strong style=\"color: #1E1E1E; font-weight: 600;\">Lenon Magwenjere<\u002Fstrong>, each episode features conversations with founders, executives, innovators, creators, pastors, investors, and thought leaders who share practical lessons for builders everywhere.<\u002Fp>\n          <p>Whether you're leading a company, launching a startup, serving your community, or simply trying to build a meaningful life — this is your handbook.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"margin-top: 30px; display: inline-flex; align-items: center; gap: 14px;\">\n          <div style=\"width: 44px; height: 1px; background: #B08D57;\"><\u002Fdiv>\n          <span style=\"font-family: 'Playfair Display', serif; font-style: italic; font-size: 19px; color: #1E1E1E;\">Build on purpose.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: relative;\">\n        <div style=\"position: relative; aspect-ratio: 4/5; border-radius: 18px; overflow: hidden; box-shadow: 0 20px 50px rgba(30,30,30,0.2); background: #1E1E1E;\">\n          <x-import component-from-global-scope=\"image-slot\" from=\"ad4f9159-5cd3-411a-b67d-1b1c127f3af5#/image-slot.js\" id=\"bh-host-photo\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop host photo\" hint-size=\"100%,100%\"><\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"position: absolute; bottom: -14px; left: -14px; background: #1E1E1E; color: #F7F4EE; padding: 14px 20px; border-radius: 12px; box-shadow: 0 12px 30px rgba(30,30,30,0.25);\">\n          <div style=\"font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600;\">Lenon Magwenjere<\u002Fdiv>\n          <div style=\"font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #B08D57; font-weight: 600; margin-top: 3px;\">Host · Founder<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHERE TO LISTEN -->\n  <section id=\"listen\" style=\"position: relative; background: linear-gradient(135deg, #1E1E1E 0%, #141414 100%); color: #F7F4EE; padding: clamp(64px, 8vw, 116px) clamp(24px, 5vw, 64px); text-align: center;\">\n    <div style=\"max-width: 1000px; margin: 0 auto;\">\n      <div style=\"display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; margin-bottom: 22px;\">\n        <svg width=\"56\" height=\"56\" viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#B08D57\" stroke-width=\"1.5\" opacity=\"0.6\"><\u002Fcircle><path d=\"M50 12 L57 43 L88 50 L57 57 L50 88 L43 57 L12 50 L43 43 Z\" fill=\"#B08D57\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: #B08D57; font-weight: 600;\">Where to Listen<\u002Fdiv>\n      <h2 style=\"font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(28px, 4vw, 46px); letter-spacing: -0.01em; margin-top: 12px;\">Subscribe wherever you build.<\u002Fh2>\n      <p style=\"max-width: 520px; margin: 18px auto 0; font-size: 16px; line-height: 1.7; color: rgba(247,244,238,0.65);\">New conversations every week. Follow the show so you never miss an episode.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 44px;\" class=\"bh-listen-grid\">\n        <sc-for list=\"{{ platforms }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <a href=\"#\" style=\"display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 34px 20px; background: rgba(247,244,238,0.04); border: 1px solid rgba(247,244,238,0.1); border-rad sodes<\u002Fa>\n        <a href=\"#about\" style=\"color: rgba(247,244,238,0.7);\" style-hover=\"color: #F7F4EE;\">About<\u002Fa>\n        <a href=\"#listen\" style=\"color: rgba(247,244,238,0.7);\" style-hover=\"color: #F7F4EE;\">Listen<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1140px; margin: 34px auto 0; padding-top: 24px; border-top: 1px solid rgba(247,244,238,0.08); display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center;\">\n      <div style=\"font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase; color: rgba(247,244,238,0.45); font-weight: 500;\">Think Better · Lead Better · Build What Matters<\u002Fdiv>\n      <div style=\"font-size: 12px; color: rgba(247,244,238,0.4);\">© 2026 The Builder's Handbook<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { isPlaying: false, currentTime: 0 };\n\n  episodes = [\n    { num: '06', title: \"Building Businesses That Outlast You\", guest: \"Dara Okafor\", category: \"Business\", duration: \"47:12\" },\n    { num: '05', title: \"The Discipline of Great Leadership\", guest: \"Marcus Bello\", category: \"Leadership\", duration: \"52:04\" },\n    { num: '04', title: \"AI Without the Hype\", guest: \"Priya Nair\", category: \"AI · Technology\", duration: \"41:38\" },\n    { num: '03', title: \"Faith, Work, and the Meaning of Purpose\", guest: \"Pastor Daniel Moyo\", category: \"Faith\", duration: \"58:20\" },\n    { num: '02', title: \"Designing Communities That Endure\", guest: \"Sarah Klein\", category: \"Society\", duration: \"44:57\" },\n    { num: '01', title: \"Innovating for the Next Decade\", guest: \"Tobias Lund\", category: \"Innovation · The Future\", duration: \"49:15\" },\n  ];\n\n  featured = {\n    category: \"Business\",\n ring(sec).padStart(2, '0');\n  }\n\n  toggle = () => {\n    this.setState(st => {\n      const next = !st.isPlaying;\n      if (next) this.start(); else this.stop();\n      return { isPlaying: next };\n    });\n  };\n\n  start() {\n    this.stop();\n    this._t = setInterval(() => {\n      this.setState(st => {\n        const nt = st.currentTime + 0.5;\n        if (nt >= this.featured.durationSec) {\n          this.stop();\n          return { currentTime: 0, isPlaying: false };\n        }\n        return { currentTime: nt };\n      });\n    }, 500);\n  }\n\n  stop() {\n    if (this._t) { clearInterval(this._t); this._t = null; }\n  }\n\n  seek = (e) => {\n    const r = e.currentTarget.getBoundingClientRect();\n    const pct = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));\n    this.setState({ currentTime: pct * this.featured.durationSec });\n  };\n\n  componentWillUnmount() { this.stop(); }\n\n  renderVals() {\n    const dur = this.featured.durationSec;\n    const cur = this.state.currentTime;\n    return {\n      episodes: this.episodes,\n      categories: this.categories,\n      platforms: this.platforms,\n      featured: this.featured,\n      isPlaying: this.state.isPlaying,\n      notPlaying: !this.state.isPlaying,\n      curTime: this.fmt(cur),\n      durTime: this.fmt(dur),\n      progressPct: (cur / dur * 100).toFixed(2) + '%',\n      togglePlay: this.toggle,\n      seek: this.seek,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
